# DAG_APP configuration for 5K DAG workload
simulation_time=180
warm_up_period=5
vm_load_check_interval=0.1
location_check_interval=0.1
file_log_enabled=false
deep_file_log_enabled=false

min_number_of_mobile_devices=150
max_number_of_mobile_devices=150
mobile_device_counter_size=300

wlan_range=50
wan_propagation_delay=0.3
lan_internal_delay=0.002
wlan_bandwidth=200
wan_bandwidth=10
gsm_bandwidth=0

# Cloud infrastructure (fallback if no cloud tier in XML)
number_of_host_on_cloud_datacenter=1
number_of_vm_on_cloud_host=24
core_for_cloud_vm=24
mips_for_cloud_vm=300000
ram_for_cloud_vm=32000
storage_for_cloud_vm=1000000
cloud_cost_per_sec=0.00000000000007
cloud_cost_multiplier_vs_edge=0.33
cloud_cost_per_bw=0.000000000333
cloud_cost_per_mem=0.0
cloud_cost_per_storage=0.0

# Mobile processing unit
core_for_mobile_vm=1
mips_for_mobile_vm=1000
ram_for_mobile_vm=1024
storage_for_mobile_vm=10000

# IMPORTANT: enable remote RL orchestrator
orchestrator_policies=REMOTE_RL

# Remote RL service endpoint
rl_service_url=http://127.0.0.1:8009
http_timeout_ms=10000
training_mode=true

# Reward parameters used in Java-side reward computation
alpha_l=1.0
alpha_c=1.0
l_hat=1000.0
c_hat=1.0
b_cost=140.0
budget_penalty=-1.0

simulation_scenarios=TWO_TIER

# Mean waiting times by place attractiveness
attractiveness_L1_mean_waiting_time=500
attractiveness_L2_mean_waiting_time=300
attractiveness_L3_mean_waiting_time=120

# 5K DAG arrival process (Poisson mean, seconds)
dag_interarrival_rate=2.0

# Input DAG dataset path (must be a JSON object or {"dags":[...]} container)
dag_input_path=/srv/data1/home/018179980/siva/EdgeCloudSim/src/edu/boun/edgecloudsim/dagsim/synthetic_dags_5k_container.json

# Reproducibility
rng_seed=42
stop_when_queues_empty=false
