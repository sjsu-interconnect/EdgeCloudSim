# Balanced RL config (5K DAGs) with reduced edge capacity to force cloud usage
simulation_time=600
warm_up_period=5
vm_load_check_interval=0.1
location_check_interval=0.1
file_log_enabled=true
deep_file_log_enabled=false

min_number_of_mobile_devices=50
max_number_of_mobile_devices=50
mobile_device_counter_size=100

wlan_range=200
edge_propagation_delay=0.01
wan_propagation_delay=0.1
lan_internal_delay=0.002
wlan_bandwidth=250
wan_bandwidth=200
gsm_bandwidth=0

# Cloud infrastructure (moderate)
number_of_host_on_cloud_datacenter=1
number_of_vm_on_cloud_host=6
core_for_cloud_vm=4
mips_for_cloud_vm=14000
ram_for_cloud_vm=16000
storage_for_cloud_vm=500000

# Cloud cost configuration
# Keep cloud cheaper than edge to encourage offload when edge is saturated
cloud_cost_per_sec=-1.0
cloud_cost_multiplier_vs_edge=0.333333
cloud_cost_per_bw=0.00000000012
cloud_cost_per_mem=0.0
cloud_cost_per_storage=0.0

# Mobile processing unit
core_for_mobile_vm=1
mips_for_mobile_vm=1000
ram_for_mobile_vm=1024
storage_for_mobile_vm=10000

# Orchestrator
orchestrator_policies=REMOTE_RL

# Remote RL service endpoint
rl_service_url=http://127.0.0.1:8009
http_timeout_ms=10000
training_mode=true

# Reward parameters
alpha_l=1.0
alpha_c=1.0
l_hat=1000.0
c_hat=1.0
b_cost=1800.0
budget_penalty=-1.0

simulation_scenarios=TWO_TIER

# Mean waiting times by place attractiveness
attractiveness_L1_mean_waiting_time=2000
attractiveness_L2_mean_waiting_time=1200
attractiveness_L3_mean_waiting_time=600

# Mean time between new DAG requests (Poisson inter-arrival) in seconds
# Slightly higher load than balanced to stress edge capacity
dag_interarrival_rate=2.5

# Input DAG dataset path (must be a JSON object or {"dags":[...]} container)
dag_input_path=/srv/data1/home/018179980/siva/EdgeCloudSim/src/edu/boun/edgecloudsim/dagsim/synthetic_dags_5k_container.json

# Reproducibility
rng_seed=42
stop_when_queues_empty=false
